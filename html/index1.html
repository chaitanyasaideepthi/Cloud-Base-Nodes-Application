<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Front Page</title>
  <style>
    body, html {
      margin: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* Background image and overlay */
    body {
      background: 
        linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      padding: 20px;
    }

    .content {
      max-width: 900px;
      background: rgba(0, 0, 0, 0.55);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 0.3em;
    }

    h2 {
      font-weight: 500;
      font-style: italic;
      font-size: 1.8rem;
      margin-bottom: 1.5em;
      color: #ccc;
      line-height: 1.3;
    }

    button {
      background-color: #4a90e2;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s ease;
      margin-top: 1.5em;
    }

    button:hover {
      background-color: #357ABD;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }
      h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Welcome to My Project</h1>
    <h2>An Intelligent Cloud-Based Notes Sharing System for Collaborative Learning</h2>
    <button>Get Started</button>
  </div>
</body>
</html>
