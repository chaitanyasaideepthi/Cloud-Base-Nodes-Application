<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e88e5, #26c6da);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .container h2 {
            margin-bottom: 25px;
            color: #1e88e5;
            font-size: 26px;
        }

        .container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }

        .container input:focus {
            border-color: #1e88e5;
            box-shadow: 0 0 6px rgba(30, 136, 229, 0.4);
        }

        .container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #1e88e5, #1565c0);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
        }

        .container button:hover {
            opacity: 0.9;
        }

        .container p {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        .container a {
            color: #1e88e5;
            text-decoration: none;
            font-weight: 600;
        }

        .container a:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .container {
                width: 90%;
            }
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form onsubmit="login(event)">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>New user? <a href="register.html">Register</a></p>
</div>

<script>
function login(event) {
    event.preventDefault();

    let email = localStorage.getItem("email");
    let password = localStorage.getItem("password");

    if (loginEmail.value === email && loginPassword.value === password) {
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid Login Details");
    }
}
</script>

</body>
</html>
